<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" stroke="#F5F3EE" stroke-width="2" fill="none"/>
  <!-- Spokes from center to nodes -->
  <line x1="100" y1="100" x2="100" y2="20" stroke="#F5F3EE" stroke-width="2"/>
  <line x1="100" y1="100" x2="169" y2="60" stroke="#F5F3EE" stroke-width="2"/>
  <line x1="100" y1="100" x2="169" y2="140" stroke="#F5F3EE" stroke-width="2"/>
  <line x1="100" y1="100" x2="100" y2="180" stroke="#F5F3EE" stroke-width="2"/>
  <line x1="100" y1="100" x2="31" y2="140" stroke="#F5F3EE" stroke-width="2"/>
  <line x1="100" y1="100" x2="31" y2="60" stroke="#F5F3EE" stroke-width="2"/>
  <!-- Center hub (orange) -->
  <circle cx="100" cy="100" r="24" fill="#E8722A"/>
  <!-- Outer nodes (cream) -->
  <circle cx="100" cy="20" r="10" fill="#F5F3EE"/>
  <circle cx="169" cy="60" r="10" fill="#F5F3EE"/>
  <circle cx="169" cy="140" r="10" fill="#F5F3EE"/>
  <circle cx="100" cy="180" r="10" fill="#F5F3EE"/>
  <circle cx="31" cy="140" r="10" fill="#F5F3EE"/>
  <circle cx="31" cy="60" r="10" fill="#F5F3EE"/>
</svg>
